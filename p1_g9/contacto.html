    <h1>Formulario de Contacto</h1>
    <form action="mailto:tuemail@ejemplo.com" method="post" enctype="text/plain">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="correo" required><br><br>

        <label>Motivo de la consulta:</label><br>
        <input type="radio" name="motivo" value="Evaluacion"> Evaluación
        <input type="radio" name="motivo" value="Sugerencias"> Sugerencias
        <input type="radio" name="motivo" value="Criticas"> Críticas<br><br>

        <input type="checkbox" name="terminos" required> 
        Marque esta casilla para verificar que ha leído nuestros términos y condiciones del servicio<br><br>

        <label>Consulta:</label><br>
        <textarea name="mensaje" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Enviar">
    </form>
